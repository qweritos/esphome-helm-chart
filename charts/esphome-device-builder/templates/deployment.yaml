apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "esphome-device-builder.fullname" . }}
  labels:
    {{- include "esphome-device-builder.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "esphome-device-builder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "esphome-device-builder.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "esphome-device-builder.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hostNetwork.enabled }}
      hostNetwork: true
      dnsPolicy: {{ .Values.hostNetwork.dnsPolicy }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName | quote }}
      {{- end }}
      {{- if .Values.schedulerName }}
      schedulerName: {{ .Values.schedulerName | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "esphome-device-builder.name" . }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - dashboard
            - {{ .Values.dashboard.configPath | quote }}
            - --port
            - {{ .Values.dashboard.port | quote }}
            {{- with .Values.dashboard.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
            {{- if .Values.remoteBuild.enabled }}
            - name: remote-build
              containerPort: {{ .Values.remoteBuild.port }}
              protocol: TCP
            {{- end }}
          {{- if or .Values.env.TZ .Values.dashboard.trustedDomains .Values.remoteBuild.enabled .Values.auth.enabled .Values.extraEnv }}
          env:
            {{- if .Values.env.TZ }}
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            {{- end }}
            {{- if .Values.dashboard.trustedDomains }}
            - name: ESPHOME_TRUSTED_DOMAINS
              value: {{ join "," .Values.dashboard.trustedDomains | quote }}
            {{- end }}
            {{- if .Values.remoteBuild.enabled }}
            - name: ESPHOME_REMOTE_BUILD_PORT
              value: {{ .Values.remoteBuild.port | quote }}
            - name: ESPHOME_REMOTE_BUILD_HOST
              value: {{ .Values.remoteBuild.host | quote }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: ESPHOME_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "esphome-device-builder.authSecretName" . }}
                  key: {{ .Values.auth.usernameKey }}
            - name: ESPHOME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "esphome-device-builder.authSecretName" . }}
                  key: {{ .Values.auth.passwordKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: {{ .Values.dashboard.configPath }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (include "esphome-device-builder.fullname" .) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
